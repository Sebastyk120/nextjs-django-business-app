{% load crispy_forms_tags %}
<style>
    .form-label {
        color: #16168c;
        font-weight: 500;
    }
    .card-header {
        border-radius: 5px 5px 0 0;
    }
    .card {
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }
    .btn {
        border-radius: 4px;
        font-weight: 500;
    }
    .btn-success {
        background-color: #28a745;
        border-color: #28a745;
    }
    .form-control:focus {
        border-color: #28a745;
        box-shadow: 0 0 0 0.2rem rgba(40,167,69,0.25);
    }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<form method="post" id="ventaNacionalForm" action="{% url 'venta_nacional_create' compra.id %}">
    {% csrf_token %}
    <div class="container-fluid px-0">
        {% crispy form %}
        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
            <button type="button" class="btn btn-secondary me-md-2" data-bs-dismiss="modal">
                <i class="fas fa-times me-1"></i> Cancelar
            </button>
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save me-1"></i> Guardar Venta Nacional
            </button>
        </div>
    </div>
</form>

<script>
    $(document).ready(function() {
        $('.select2').select2();
        $('.datepicker').datepicker({
            format: 'yyyy-mm-dd',
            autoclose: true
        });
    });
</script>
