<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heaven's Fruits SAS{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Design System -->
    <link rel="stylesheet" href="{% static 'css/heavens-design-system.css' %}">
    
    <!-- Additional styles -->
    {% block extra_css %}{% endblock %}
    
    <!-- Accessibility -->
    <script>
        // High contrast mode detection
        function checkHighContrast() {
            if (window.matchMedia("(prefers-contrast: more)").matches) {
                document.documentElement.classList.add('high-contrast-mode');
            }
        }
        checkHighContrast();
        
        // Check user preferences for reduced motion
        function checkReducedMotion() {
            if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
                document.documentElement.classList.add('reduced-motion');
            }
        }
        checkReducedMotion();
    </script>
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only">Saltar al contenido principal</a>
    
    {% block body %}{% endblock %}
    
    <!-- Base scripts -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    
    <!-- Additional scripts -->
    {% block extra_js %}{% endblock %}
</body>
</html>
