# nixpacks.toml

[phases.setup]
# Instalar Python 3.11 y los paquetes de Nix
nixPkgs = [
  "python312"
]

# Instalar paquetes de apt-get si es necesario
aptPkgs = [
  "build-essential",
  "libffi-dev",
  "shared-mime-info",
  "libjpeg-dev",
  "zlib1g-dev",
  "libfreetype6-dev",
  "liblcms2-dev",
  "libopenjpeg-dev",
  "libtiff5-dev",
  "libwebp-dev"
]

# Actualizar y limpiar caché de apt antes de instalar los paquetes
cmds = [
  "sudo apt-get update",
  "sudo apt-get install -y --no-install-recommends build-essential",
  "sudo apt-get install -y --no-install-recommends libffi-dev",
  "sudo apt-get install -y --no-install-recommends shared-mime-info",
  "sudo apt-get install -y --no-install-recommends libjpeg-dev",
  "sudo apt-get install -y --no-install-recommends zlib1g-dev",
  "sudo apt-get install -y --no-install-recommends libfreetype6-dev",
  "sudo apt-get install -y --no-install-recommends liblcms2-dev",
  "sudo apt-get install -y --no-install-recommends libopenjpeg-dev",
  "sudo apt-get install -y --no-install-recommends libtiff5-dev",
  "sudo apt-get install -y --no-install-recommends libwebp-dev"
]

[phases.python_install]
dependsOn = ['setup']
cmds = ['pip install -r requirements.txt']

[phases.build]
# Colectar archivos estáticos y migrar la base de datos
cmds = ["python manage.py collectstatic --noinput", "python manage.py migrate"]

[start]
# Comando para iniciar la aplicación
cmd = "gunicorn mysite.wsgi"
