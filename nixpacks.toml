# nixpacks.toml

[phases.setup]
# Instalar Python 3.13 y los paquetes de Nix
nixPkgs = [
  "python313"
]

# Instalar paquetes de apt-get si es necesario
aptPkgs = [
  "build-essential",
  "python3-dev",
  "libffi-dev",
  "shared-mime-info",
  "libjpeg-dev",
  "zlib1g-dev",
  "libfreetype6-dev",
  "liblcms2-dev",
  "libtiff5-dev",
  "libwebp-dev",
  "libatlas-base-dev",
  "gfortran"
]


[phases.python_install]
dependsOn = ['setup']
cmds = ['pip install -r requirements.txt']

[phases.build]
# Colectar archivos estáticos y migrar la base de datos
cmds = ["python manage.py collectstatic --noinput", "python manage.py migrate"]

[start]
# Comando para iniciar la aplicación
cmd = "gunicorn --timeout 240 mysite.wsgi"
