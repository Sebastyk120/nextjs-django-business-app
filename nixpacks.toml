# nixpacks.toml

[phases.setup]
# Instalar Python 3.11 y los paquetes de Nix
nixPkgs = [
  "python312",
  "cairosvg",
  "cffi",
  "cssselect2",
  "fontconfig",
  "fonttools",
  "ghostscript",
  "glib",
  "harfbuzz",
  "html5lib",
  "pango",
  "pillow",
  "pydyf",
  "pyphen",
  "pytestCheckHook",
  "tinycss2"
]

# Instalar paquetes de apt-get si es necesario
aptPkgs = [
  "build-essential",
  "libcairo2",
  "libcairo2-dev",
  "libgirepository1.0-dev",
  "gir1.2-pango-1.0",
  "gir1.2-gtk-3.0",
  "python3-gi",
  "shared-mime-info",
  "libpq-dev",
  "libpango-1.0-0",
  "libpangoft2-1.0-0",
  "libjpeg-dev",
  "libopenjp2-7-dev",
  "libffi-dev"
]

[phases.python_install]
    dependsOn = ['setup']
    cmds = ['pip install -r requirements.txt']

[phases.build]
# Colectar archivos estáticos y migrar la base de datos
cmds = ["python manage.py collectstatic --noinput", "python manage.py migrate"]

[start]
# Comando para iniciar la aplicación
cmd = "gunicorn mysite.wsgi"
